# Test Configuration for Repayment Integration Tests

# Use embedded MongoDB for testing (matches production)
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=microfinance_test

# Disable JPA since we're using MongoDB
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Enable MongoDB auditing for tests
spring.data.mongodb.repositories.type=auto

# Test profile specific settings - reduced logging for performance
logging.level.com.microfinance=INFO
logging.level.org.springframework.security=WARN

# Security configuration for tests
spring.security.enabled=false