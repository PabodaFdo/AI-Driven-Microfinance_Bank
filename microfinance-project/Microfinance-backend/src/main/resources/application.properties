spring.application.name=staff-backend
server.port=8080

# Load environment variables from .env file
spring.config.import=optional:file:./.env[.properties]

# MongoDB (configured via MONGODB_URI environment variable for Atlas support)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/microfinance_db}

# JWT (must be at least 32 chars for HS256)
app.jwt.secret=MicrofinanceSuperSecretKeyForJwtAuth12345
app.jwt.expiration-ms=86400000

# Password Reset
app.reset-token-expiry-minutes=15
app.frontend-url=http://localhost:5173

# Email Configuration (Spring Mail)
# Uses environment variables from .env file for security
# Gmail: smtp.gmail.com (use App Password from https://myaccount.google.com/apppasswords)
# Leave MAIL_USERNAME and MAIL_PASSWORD empty in .env to use console fallback
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Helpful for local development
spring.jackson.time-zone=Asia/Colombo

